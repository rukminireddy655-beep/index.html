<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Quote Generator</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: Arial, sans-serif;
    }

    .container {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    .quote {
        font-size: 18px;
        margin-bottom: 15px;
        color: #333;
    }

    .author {
        font-size: 16px;
        margin-bottom: 20px;
        font-weight: bold;
        color: #555;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        background: #667eea;
        color: white;
        font-size: 14px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Random Quote Generator</h2>
    <div class="quote" id="quoteText">Loading quote...</div>
    <div class="author" id="quoteAuthor"></div>
    <button onclick="generateQuote()">New Quote</button>
</div>

<script>
const quotes = [
    {
        text: "The best way to get started is to quit talking and begin doing.",
        author: "Walt Disney"
    },
    {
        text: "Don’t let yesterday take up too much of today.",
        author: "Will Rogers"
    },
    {
        text: "It’s not whether you get knocked down, it’s whether you get up.",
        author: "Vince Lombardi"
    },
    {
        text: "If you are working on something exciting, it will keep you motivated.",
        author: "Steve Jobs"
    },
    {
        text: "Success is not in what you have, but who you are.",
        author: "Bo Bennett"
    }
];

function generateQuote() {
    const randomIndex = Math.floor(Math.random() * quotes.length);
    const randomQuote = quotes[randomIndex];

    document.getElementById("quoteText").innerText = `"${randomQuote.text}"`;
    document.getElementById("quoteAuthor").innerText = `- ${randomQuote.author}`;
}

// Show random quote when page loads
window.onload = generateQuote;
</script>

</body>
</html>
